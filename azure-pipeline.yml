trigger:
  branches:
    include:
    - main

variables:
  TF_VERSION: '1.7.6'

stages:

# =============================
# Stage 1: Terraform Init & Plan
# =============================
- stage: Plan
  displayName: 'Terraform Plan'
  jobs:
  - job: Terraform_Plan
    displayName: 'Terraform Plan Job'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
    - group: Terraform-Dev # Change per environment in different pipeline run
    steps:
    - checkout: self

    # Install Terraform
    - script: |
        wget https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
        unzip terraform_$(TF_VERSION)_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: 'Install Terraform'

    # Terraform Init
    - script: terraform init
      displayName: 'Terraform Init'

    # Terraform Plan
    - script: terraform plan -var-file=environments/dev.tfvars -out=tfplan
      displayName: 'Terraform Plan'

    # Save plan as artifact for approval
    - publish: tfplan
      artifact: tfplan

# =============================
# Stage 2: Terraform Apply (Manual Approval)
# =============================
- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - deployment: Terraform_Apply
    displayName: 'Terraform Apply Deployment'
    environment: 'Dev' # Azure DevOps environment for approvals
    pool:
      vmImage: 'ubuntu-latest'
    variables:
    - group: Terraform-Dev
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: tfplan

          - script: |
              terraform apply -auto-approve tfplan
            displayName: 'Terraform Apply'
